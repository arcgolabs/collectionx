# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Run the workspace test suite
    deps:
      - test:bitset
      - test:disjointset
      - test:root
      - test:examples
      - test:graph
      - test:interval
      - test:list
      - test:mapping
      - test:prefix
      - test:set
      - test:tree

  test:bitset:
    dir: bitset
    cmds:
      - go test ./...

  test:disjointset:
    dir: disjointset
    cmds:
      - go test ./...

  test:root:
    cmds:
      - go test ./...

  test:examples:
    dir: examples
    cmds:
      - go test ./...

  test:graph:
    dir: graph
    cmds:
      - go test ./...

  test:interval:
    dir: interval
    cmds:
      - go test ./...

  test:list:
    dir: list
    cmds:
      - go test ./...

  test:mapping:
    dir: mapping
    cmds:
      - go test ./...

  test:prefix:
    dir: prefix
    cmds:
      - go test ./...

  test:set:
    dir: set
    cmds:
      - go test ./...

  test:tree:
    dir: tree
    cmds:
      - go test ./...

  release:tag-all:
    desc: Create nested-module tags for VERSION
    requires:
      vars: [VERSION]
    cmds:
      - git tag bitset/v{{.VERSION}}
      - git tag disjointset/v{{.VERSION}}
      - git tag examples/v{{.VERSION}}
      - git tag graph/v{{.VERSION}}
      - git tag interval/v{{.VERSION}}
      - git tag list/v{{.VERSION}}
      - git tag mapping/v{{.VERSION}}
      - git tag prefix/v{{.VERSION}}
      - git tag set/v{{.VERSION}}
      - git tag tree/v{{.VERSION}}

  release:push-all:
    desc: Push nested-module tags for VERSION
    requires:
      vars: [VERSION]
    cmds:
      - git push origin bitset/v{{.VERSION}}
      - git push origin disjointset/v{{.VERSION}}
      - git push origin examples/v{{.VERSION}}
      - git push origin graph/v{{.VERSION}}
      - git push origin interval/v{{.VERSION}}
      - git push origin list/v{{.VERSION}}
      - git push origin mapping/v{{.VERSION}}
      - git push origin prefix/v{{.VERSION}}
      - git push origin set/v{{.VERSION}}
      - git push origin tree/v{{.VERSION}}

  release:publish:
    desc: Create and push nested-module tags for VERSION
    requires:
      vars: [VERSION]
    cmds:
      - task: release:tag-all
        vars:
          VERSION: "{{.VERSION}}"
      - task: release:push-all
        vars:
          VERSION: "{{.VERSION}}"
